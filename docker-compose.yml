version: '3.8'

services:
  aii-assistant:
    build: .
    container_name: aii-assistant
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    volumes:
      - ./workflows:/app/workflows
      - ./artifacts:/app/artifacts
      - ./config:/app/config
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from core import StateDB; print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

