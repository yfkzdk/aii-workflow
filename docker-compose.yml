version: '3.8'

services:
  aii-assistant:
    build: .
    container_name: aii-assistant
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-deepseek-chat}
      - AII_AUTH_USERNAME=${AII_AUTH_USERNAME:-demo}
      - AII_AUTH_PASSWORD=${AII_AUTH_PASSWORD:-demo}
      - AII_AUTH_ENABLED=${AII_AUTH_ENABLED:-false}
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
    volumes:
      - ./workflows:/app/workflows
      - ./artifacts:/app/artifacts
      - ./config:/app/config
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s